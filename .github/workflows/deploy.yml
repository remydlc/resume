name: Deploy Resume Infrastructure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '18'
  GO_VERSION: '1.21'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy CDK Infrastructure & Frontend

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Step 3: Setup Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: src/backend/counter/go.sum

      # Step 4: Install dependencies
      - name: Install NPM Dependencies
        run: npm install

      # Step 5: Assume AWS Role via OIDC
      - name: Assume AWS Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 6: Build Go Lambda function
      - name: Build Go Lambda Function
        run: |
          cd src/backend/counter
          go mod download
          GOOS=linux GOARCH=arm64 go build -o bootstrap main.go
          cd ../../..

      # Step 7: Synthesize CDK
      - name: Synthesize CDK
        run: npm run cdk:synth

      # Step 8: Deploy CDK Infrastructure
      - name: Deploy CDK Infrastructure
        run: npm run cdk:deploy
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      # Step 9: Get API Endpoint from CloudFormation stack
      - name: Get API Endpoint
        id: get-outputs
        run: |
          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ResumeStack \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiGatewayEndpoint`].OutputValue' \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ResumeStack \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)

          echo "api_endpoint=${API_ENDPOINT}" >> $GITHUB_OUTPUT
          echo "distribution_id=${DISTRIBUTION_ID}" >> $GITHUB_OUTPUT
          echo "API Endpoint: ${API_ENDPOINT}"
          echo "CloudFront Distribution ID: ${DISTRIBUTION_ID}"

      # Step 10: Update Frontend HTML with API Endpoint
      - name: Update Frontend with API Endpoint
        run: |
          API_ENDPOINT="${{ steps.get-outputs.outputs.api_endpoint }}"
          FRONTEND_FILE="src/frontend/index.html"

          if [ ! -f "$FRONTEND_FILE" ]; then
            echo "⚠️  Frontend file not found at $FRONTEND_FILE"
            exit 1
          fi

          # Replace or inject the API endpoint in the HTML
          # Assumes the HTML has a placeholder or script that uses API_ENDPOINT
          sed -i "s|API_ENDPOINT = '[^']*'|API_ENDPOINT = '${API_ENDPOINT}'|g" "$FRONTEND_FILE"
          sed -i "s|const API_ENDPOINT = ''|const API_ENDPOINT = '${API_ENDPOINT}'|g" "$FRONTEND_FILE"

          echo "✅ Frontend updated with API endpoint: ${API_ENDPOINT}"
          cat "$FRONTEND_FILE" | grep -i "api" || echo "No API reference found in HTML (this is OK)"

      # Step 11: Upload Frontend to S3
      - name: Upload Frontend to S3
        run: |
          BUCKET_NAME="resume.nine3one2.com"

          aws s3 sync src/frontend/ s3://${BUCKET_NAME}/ \
            --delete \
            --cache-control "max-age=3600" \
            --region ${{ env.AWS_REGION }}

          echo "✅ Frontend uploaded to S3 bucket: ${BUCKET_NAME}"

      # Step 12: Invalidate CloudFront Cache
      - name: Invalidate CloudFront Cache
        run: |
          DISTRIBUTION_ID="${{ steps.get-outputs.outputs.distribution_id }}"

          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*" \
            --region ${{ env.AWS_REGION }}

          echo "✅ CloudFront cache invalidated for distribution: ${DISTRIBUTION_ID}"

      # Step 13: Deployment Summary
      - name: Deployment Summary
        if: success()
        run: |
          echo "🎉 Deployment Complete!"
          echo ""
          echo "📊 Summary:"
          echo "  - Infrastructure: ✅ Deployed via CDK"
          echo "  - API Endpoint: ${{ steps.get-outputs.outputs.api_endpoint }}"
          echo "  - Website URL: https://resume.nine3one2.com"
          echo "  - CloudFront Distribution: ${{ steps.get-outputs.outputs.distribution_id }}"
          echo ""
          echo "🔗 Visit your resume: https://resume.nine3one2.com"

      # Step 14: Failure Notification
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
          exit 1
